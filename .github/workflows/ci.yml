name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # `uv sync` resolves from pyproject.toml (and uv.lock if committed). Add
      # `--frozen` once uv.lock is committed to enforce the lockfile.
      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Compile all
        run: uv run python -m compileall -q backtest.py backtest_robustness.py wfo_optimizer.py composer.py data.py agent.py server.py constants.py web tests

      - name: Pytest
        run: uv run pytest -q tests
