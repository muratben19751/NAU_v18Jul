{% extends "base.html" %}
{% block content %}
{% include "fragments/compose_body.html" %}
{% endblock %}

{% block scripts %}
<script>
  function loadWiki(t) {
    fetch("/strategy/wiki?type=" + encodeURIComponent(t))
      .then(r => r.text())
      .then(html => { document.getElementById("wiki-panel").outerHTML = html; });
  }
</script>
{% endblock %}
